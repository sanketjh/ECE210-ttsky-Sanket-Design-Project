# Tiny Tapeout project information
project:
  title:        "Integrate-and-fire Neuron"      # Project title
  author:       "Sanket Hanamashetti"      # Your name
  discord:      ""      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Implements an integrate-and-fire neuron in Verilog"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     0       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_iaf_neuron"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "iaf_neuron.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "Input Current/Voltage Spike [0]"
  ui[1]: "Input Current/Voltage Spike [1]"
  ui[2]: "Input Current/Voltage Spike [2]"
  ui[3]: "Input Current/Voltage Spike [3]"
  ui[4]: "Input Current/Voltage Spike [4]"
  ui[5]: "Input Current/Voltage Spike [5]"
  ui[6]: "Input Current/Voltage Spike [6]"
  ui[7]: "Input Current/Voltage Spike [7]"

  # Outputs
  uo[0]: "Action Potential [0]"
  uo[1]: "Action Potential [1]"
  uo[2]: "Action Potential [2]"
  uo[3]: "Action Potential [3]"
  uo[4]: "Action Potential [4]"
  uo[5]: "Action Potential [5]"
  uo[6]: "Action Potential [6]"
  uo[7]: "Action Potential [7]"

  # Bidirectional pins
  uio[0]: "UNUSED"
  uio[1]: "UNUSED"
  uio[2]: "UNUSED"
  uio[3]: "UNUSED"
  uio[4]: "UNUSED"
  uio[5]: "UNUSED"
  uio[6]: "UNUSED"
  uio[7]: "Output Spike"

# Do not change!
yaml_version: 6
